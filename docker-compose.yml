# 知讯 - 内容资讯发布与管理系统 Docker Compose 部署配置
# 使用方式：docker compose up -d

services:
  # ==================== 基础设施服务 ====================

  # MySQL 8.0 数据库
  mysql:
    image: mysql:8.0
    container_name: zhixun-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zhixun}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      # 数据库初始化脚本（首次启动时自动执行）
      - ./server/src/main/resources/db/:/docker-entrypoint-initdb.d/
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-character-set-client-handshake
      --default-authentication-plugin=caching_sha2_password
      --max-connections=500
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - zhixun-network

  # Redis 7 缓存
  redis:
    image: redis:7-alpine
    container_name: zhixun-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhixun-network

  # RabbitMQ 3.12 消息队列（含管理界面）
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: zhixun-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
      TZ: Asia/Shanghai
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - zhixun-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: zhixun-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-zhixun321}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-zhixun321}
      TZ: Asia/Shanghai
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - zhixun-network

  # OpenSearch 搜索引擎（含 IK 分词 + 拼音插件）
  opensearch:
    build:
      context: ./opensearch
      dockerfile: Dockerfile
    image: zhixun-opensearch:2.11.0
    container_name: zhixun-opensearch
    restart: unless-stopped
    ports:
      - "${OPENSEARCH_HTTP_PORT:-9200}:9200"
      - "${OPENSEARCH_TRANSPORT_PORT:-9600}:9600"
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_SECURITY_PLUGIN: "true"
      bootstrap.memory_lock: "true"
      TZ: Asia/Shanghai
    volumes:
      - opensearch_data:/usr/share/opensearch/data
      - ./server/src/main/resources/opensearch/synonyms.txt:/usr/share/opensearch/config/opensearch/synonyms.txt:ro
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sfo /dev/null http://localhost:9200 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - zhixun-network

  # ==================== 应用服务 ====================

  # Spring Boot 后端服务 - 实例1
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: zhixun-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      # Spring 配置
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      # MySQL 连接信息
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DATABASE:-zhixun}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      # MySQL 从库（单节点部署时指向主库）
      MYSQL_SLAVE_HOST: mysql
      MYSQL_SLAVE_PORT: 3306
      MYSQL_SLAVE_DB: ${MYSQL_DATABASE:-zhixun}
      MYSQL_SLAVE_USER: root
      MYSQL_SLAVE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      # Redis 连接信息
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      # RabbitMQ 连接信息
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      # MinIO 连接信息
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-zhixun321}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-zhixun321}
      MINIO_BUCKET: ${MINIO_BUCKET:-zhixun}
      # OpenSearch 连接信息
      OPENSEARCH_HOSTS: http://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-zhixun321!}
      # JWT 密钥（至少32字节，Base64编码）
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-sdOJgjRUoN/+6k2rJMlZOilv1uTKJfQJ9uoG/8fmPok=}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-STApEN/Ne/o9C+g7A8CnMM31+ChzquUR8GFXH97l7v4=}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-7200}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800}
      # AES 密钥（精确32字节，Base64编码）
      AES_SECRET_KEY: ${AES_SECRET_KEY:-AMF+MWnL9m0KZLx8b5rV778ntzrsQ7pnBzf4kF94py0=}
      # 邮件配置（QQ邮箱SSL 465端口）
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # CORS 允许的来源
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://glint.novo.ccwu.cc,http://glint.novo.ccwu.cc,http://localhost:3000,http://localhost:3001}
      # 时区
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - zhixun-network

  # Spring Boot 后端服务 - 实例2
  server-2:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: zhixun-server-2
    restart: unless-stopped
    ports:
      - "${SERVER_2_PORT:-8081}:8080"
    environment:
      # Spring 配置
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      # MySQL 连接信息
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DATABASE:-zhixun}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      # MySQL 从库（单节点部署时指向主库）
      MYSQL_SLAVE_HOST: mysql
      MYSQL_SLAVE_PORT: 3306
      MYSQL_SLAVE_DB: ${MYSQL_DATABASE:-zhixun}
      MYSQL_SLAVE_USER: root
      MYSQL_SLAVE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      # Redis 连接信息
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      # RabbitMQ 连接信息
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      # MinIO 连接信息
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-zhixun321}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-zhixun321}
      MINIO_BUCKET: ${MINIO_BUCKET:-zhixun}
      # OpenSearch 连接信息
      OPENSEARCH_HOSTS: http://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-zhixun321!}
      # JWT 密钥（至少32字节，Base64编码）
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-sdOJgjRUoN/+6k2rJMlZOilv1uTKJfQJ9uoG/8fmPok=}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-STApEN/Ne/o9C+g7A8CnMM31+ChzquUR8GFXH97l7v4=}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-7200}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800}
      # AES 密钥（精确32字节，Base64编码）
      AES_SECRET_KEY: ${AES_SECRET_KEY:-AMF+MWnL9m0KZLx8b5rV778ntzrsQ7pnBzf4kF94py0=}
      # 邮件配置（QQ邮箱SSL 465端口）
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # CORS 允许的来源
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://glint.novo.ccwu.cc,http://glint.novo.ccwu.cc,http://localhost:3000,http://localhost:3001}
      # 时区
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - zhixun-network

  # Nuxt 3 C端前端
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: zhixun-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    environment:
      # Nuxt 运行时环境变量（通过 NUXT_ 前缀覆盖 runtimeConfig）
      # 服务端私有配置：后端API地址（SSR容器间通信）
      NUXT_API_BASE: http://server:8080
      # 公共配置：客户端API基础路径（经 Nginx 代理）
      NUXT_PUBLIC_API_BASE: /api/v1
      # 公共配置：WebSocket路径（经 Nginx 代理）
      NUXT_PUBLIC_WS_BASE: /ws
      # 公共配置：MinIO 内部地址（用于识别并替换为公网代理路径）
      NUXT_PUBLIC_MINIO_INTERNAL_URL: http://minio:9000
      # 公共配置：MinIO 公网访问路径（浏览器通过 Nginx 代理访问）
      NUXT_PUBLIC_MINIO_PUBLIC_URL: /minio
      TZ: Asia/Shanghai
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - zhixun-network

  # Vue 3 + Element Plus 管理后台
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: zhixun-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3001}:80"
    environment:
      TZ: Asia/Shanghai
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zhixun-network

  # Nginx 反向代理（Docker 内部）
  # 注意：如果服务器上已有宿主机 Nginx，则使用宿主机 Nginx 直接代理到各 Docker 服务
  # 宿主机 Nginx 配置文件：nginx/glint.novo.ccwu.cc.conf
  # Docker Nginx 仅在未安装宿主机 Nginx 时使用
  nginx:
    image: nginx:alpine
    container_name: zhixun-nginx
    restart: unless-stopped
    profiles:
      - standalone
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      client:
        condition: service_started
      admin:
        condition: service_started
      server:
        condition: service_healthy
      server-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --no-check-certificate https://127.0.0.1:443/ 2>/dev/null || wget --spider http://127.0.0.1:80/ --max-redirect=0 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - zhixun-network

  # ==================== 安全与测试服务 ====================

  # SonarQube 代码安全静态分析
  sonarqube:
    image: sonarqube:community
    container_name: zhixun-sonarqube
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "${SONARQUBE_PORT:-9001}:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: ${SONARQUBE_DB_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD:-sonar123}
      TZ: Asia/Shanghai
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      sonarqube-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - zhixun-network

  # SonarQube PostgreSQL 数据库
  sonarqube-db:
    image: postgres:15-alpine
    container_name: zhixun-sonarqube-db
    restart: unless-stopped
    profiles:
      - dev
    environment:
      POSTGRES_USER: ${SONARQUBE_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD:-sonar123}
      POSTGRES_DB: sonar
      TZ: Asia/Shanghai
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhixun-network

# ==================== 数据卷 ====================
volumes:
  # MySQL 数据持久化
  mysql_data:
    driver: local
  # Redis 数据持久化
  redis_data:
    driver: local
  # RabbitMQ 数据持久化
  rabbitmq_data:
    driver: local
  # MinIO 数据持久化
  minio_data:
    driver: local
  # OpenSearch 数据持久化
  opensearch_data:
    driver: local
  # SonarQube 数据持久化
  sonarqube_data:
    driver: local
  sonarqube_logs:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_db_data:
    driver: local

# ==================== 网络 ====================
networks:
  zhixun-network:
    driver: bridge
