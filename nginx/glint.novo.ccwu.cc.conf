# 知讯系统 - 宿主机 Nginx 站点配置
# 安装方式：将此文件复制到 /etc/nginx/sites-available/glint.novo.ccwu.cc
# 然后创建软链接：sudo ln -s /etc/nginx/sites-available/glint.novo.ccwu.cc /etc/nginx/sites-enabled/
# 最后重载配置：sudo nginx -t && sudo systemctl reload nginx
#
# iOS 兼容说明：
# - 已启用 OCSP Stapling，避免 iOS 因无法联系 OCSP 响应器而拒绝连接
# - 已优化 TLS cipher suite，确保 iOS ATS 兼容
# - 已处理 Cloudflare Flexible SSL 模式下的重定向循环
# - CSP 已移除 http:/ws: 降级协议，符合 iOS ATS 要求
#
# Cloudflare 面板必须设置：
# 1. SSL/TLS 加密模式 → Full (Strict)
# 2. 最低 TLS 版本 → TLS 1.2
# 3. 始终使用 HTTPS → 开启

# Cloudflare Flexible SSL 兼容：
# 当 CF SSL 模式为 Flexible 时，CF 通过 HTTP 连接源站但设置 X-Forwarded-Proto: https
# 此时不应重定向到 HTTPS，否则 iOS 设备会出现重定向循环 (ERR_TOO_MANY_REDIRECTS)
map $http_x_forwarded_proto $redirect_to_https {
    default      1;   # 非 Cloudflare 代理的直连 HTTP 请求 → 重定向
    "https"      0;   # Cloudflare 已处理 HTTPS → 不重定向
}

# HTTP -> HTTPS 重定向（兼容 Cloudflare Flexible SSL）
server {
    listen 80;
    listen [::]:80;
    server_name glint.novo.ccwu.cc;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 兼容 Cloudflare Flexible SSL：当 CF 通过 HTTP 转发（X-Forwarded-Proto: https）时，
    # 直接代理到后端，避免 HTTP→HTTPS 重定向循环导致 iOS 白屏
    location / {
        if ($redirect_to_https) {
            return 301 https://$host$request_uri;
        }
        # Cloudflare Flexible SSL 回退：直接代理到前端
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Cloudflare Flexible SSL 回退：后端 API 也需代理，否则 API 请求返回 404
    location /api {
        if ($redirect_to_https) {
            return 301 https://$host$request_uri;
        }
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }
}

# HTTPS 主服务器
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name glint.novo.ccwu.cc;

    # SSL 证书配置
    ssl_certificate /etc/letsencrypt/live/glint.novo.ccwu.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glint.novo.ccwu.cc/privkey.pem;

    # SSL 安全配置（iOS ATS 兼容）
    ssl_protocols TLSv1.2 TLSv1.3;
    # iOS ATS 要求的密码套件：优先 ECDHE + AES-GCM，兼容 CHACHA20（iOS 9+）
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    # Session Tickets 启用 TLS 会话恢复，减少移动端重复握手延迟
    ssl_session_tickets on;

    # OCSP Stapling：将证书撤销状态预取并附带在 TLS 握手中，
    # 避免 iOS 设备需要直接联系 CA 的 OCSP 响应器（部分网络环境下不可达）
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/glint.novo.ccwu.cc/chain.pem;
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # 移动端 TLS 优化：减小缓冲区避免 TCP 分片，加快首字节时间
    ssl_buffer_size 1400;

    # HSTS（移动端兼容：不使用 includeSubDomains）
    add_header Strict-Transport-Security "max-age=31536000" always;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP 策略：iOS ATS 兼容，已移除 http:/ws: 降级协议声明
    # iOS 对混合内容零容忍，connect-src/img-src 中允许 http: 会导致资源被静默屏蔽
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https: blob:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; media-src 'self' https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # 字符编码
    charset utf-8;

    # 客户端请求体大小限制（文件上传）
    client_max_body_size 20m;

    # 跨域配置（移动端兼容）
    add_header Access-Control-Allow-Origin "$http_origin" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-XSRF-TOKEN" always;

    # ==================== Gzip 压缩 ====================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # -------------------- 管理后台 --------------------
    # 管理后台 HTML 页面（不缓存，确保用户始终获取最新版本）
    location /admin/ {
        rewrite ^/admin(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # 管理后台静态资源（带哈希的 JS/CSS/字体文件，可长期缓存）
    location /admin/assets/ {
        rewrite ^/admin(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # -------------------- 后端 API --------------------
    location /api {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # -------------------- WebSocket --------------------
    location /ws {
        rewrite ^/ws(/.*)$ /api/ws$1 break;
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # -------------------- MinIO 对象存储代理 --------------------
    location /minio/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 静态资源缓存
        expires 30d;
        add_header Cache-Control "public";
        access_log off;

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # -------------------- Vue 静态资源缓存（Vite 构建产物 /assets/ 目录） --------------------
    # 端口来源：docs/PORTS.md → CLIENT_PORT=3500
    location ~* ^/assets/.*\.(js|css)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* ^/assets/.*\.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # -------------------- C端前端（默认路由，必须放在最后） --------------------
    # 端口来源：docs/PORTS.md → CLIENT_PORT=3500
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;

        # HTML 页面不缓存，确保用户始终获取最新版本
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # -------------------- 禁止访问隐藏文件 --------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
