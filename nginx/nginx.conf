# 知讯系统主 Nginx 反向代理配置
# 统一入口，将请求分发到各个服务

# 工作进程数（自动检测CPU核心数）
worker_processes auto;

events {
    # 单个工作进程的最大连接数
    worker_connections 1024;
}

http {
    # ==================== 基础配置 ====================

    # MIME 类型
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # 性能优化
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 客户端请求体大小限制（文件上传）
    client_max_body_size 20m;

    # ==================== Gzip 压缩 ====================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # ==================== 上游服务定义 ====================

    # C端前端服务
    upstream client_upstream {
        server client:3000;
    }

    # 管理后台服务
    upstream admin_upstream {
        server admin:80;
    }

    # 后端API服务 - 负载均衡（加权轮询 + 健康检查）
    upstream server_upstream {
        # 加权轮询策略：实例1权重7，实例2权重3（灰度发布比例）
        server server:8080 weight=7 max_fails=3 fail_timeout=30s;
        server server-2:8080 weight=3 max_fails=3 fail_timeout=30s;

        # 保持会话亲和性（基于客户端IP）
        ip_hash;

        # 备用后端（当所有主后端不可用时启用）
        # server backup-server:8080 backup;
    }

    # 灰度发布 - 金丝雀实例（基于Header路由）
    upstream server_canary {
        server server-2:8080 max_fails=3 fail_timeout=30s;
    }

    # ==================== HTTP -> HTTPS 重定向 ====================
    server {
        listen 80;
        server_name glint.novo.ccwu.cc localhost;

        # Let's Encrypt 验证
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其他请求重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==================== HTTPS 主服务器配置 ====================
    server {
        listen 443 ssl;
        server_name glint.novo.ccwu.cc localhost;

        # SSL 证书配置
        ssl_certificate /etc/letsencrypt/live/glint.novo.ccwu.cc/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/glint.novo.ccwu.cc/privkey.pem;

        # SSL 安全配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS（强制HTTPS）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; font-src 'self' data:; connect-src 'self' https: wss: http:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

        # -------------------- 管理后台 --------------------
        location /admin {
            # 去除 /admin 前缀后转发
            rewrite ^/admin(/.*)$ $1 break;

            proxy_pass http://admin_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 管理后台静态资源（直接代理，无需重写路径）
        location /admin/assets/ {
            rewrite ^/admin(/.*)$ $1 break;

            proxy_pass http://admin_upstream;
            proxy_set_header Host $host;

            # 静态资源长缓存
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # -------------------- 后端 API --------------------
        location /api {
            # 灰度发布路由：根据请求头 X-Canary-Version 决定是否走金丝雀实例
            # 当 Header 为 "v2" 或 "canary" 时，将请求转发到金丝雀实例
            if ($http_x_canary_version ~* "(v2|canary)") {
                proxy_pass http://server_canary;
            }

            proxy_pass http://server_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Canary-Version $http_x_canary_version;

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;

            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # 失败重试（在upstream多实例间轮询）
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        # -------------------- MinIO 对象存储代理 --------------------
        # 将 /minio/ 路径代理到 MinIO 服务，使浏览器可通过公网访问头像等资源
        location /minio/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 静态资源缓存
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # -------------------- WebSocket --------------------
        location /ws {
            proxy_pass http://server_upstream/api/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 超时设置（保持长连接）
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # -------------------- C端前端（默认路由） --------------------
        location / {
            proxy_pass http://client_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSR 页面超时设置
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        # -------------------- 静态资源缓存 --------------------
        # 带哈希的 JS/CSS 文件（长期缓存）- 仅C端前端
        location ~* ^/_nuxt/.*\.(js|css)$ {
            proxy_pass http://client_upstream;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # 图片/字体文件（中期缓存）- 仅C端前端
        location ~* ^/_nuxt/.*\.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://client_upstream;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # -------------------- 错误页面 --------------------
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # -------------------- 禁止访问隐藏文件 --------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
