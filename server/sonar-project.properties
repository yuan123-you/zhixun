# ============================================================
# SonarQube 代码安全静态分析配置
# ============================================================

# 项目基本信息
sonar.projectKey=zhixun-server
sonar.projectName=智讯 - 互联网小单售后工单系统
sonar.projectVersion=1.0.0

# 源代码路径
sonar.sources=src/main/java
sonar.tests=src/test/java

# Java 版本
sonar.java.source=17

# 编译输出目录
sonar.java.binaries=target/classes

# 排除目录
sonar.exclusions=**/target/**,**/generated/**,**/dto/**,**/entity/**,**/enums/**,**/vo/**

# 编码
sonar.sourceEncoding=UTF-8

# SonarQube 服务器地址（默认本地）
sonar.host.url=http://localhost:9000

# 认证 Token（使用时替换为实际 Token）
sonar.login=${SONAR_TOKEN:-}

# 代码覆盖率配置
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# 安全相关规则集
sonar.security.hotspots.threshold=CRITICAL
