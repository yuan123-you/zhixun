# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/zhixun?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  data:
    redis:
      host: localhost
      port: 6379
      password:

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# 开发环境开启SQL日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 开发环境日志级别
logging:
  level:
    root: INFO
    com.zhixun: DEBUG
    com.zhixun.mapper: DEBUG

# MinIO 开发环境（本地未运行时禁用）
minio:
  enabled: false
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: zhixun

# OpenSearch 开发环境（本地未运行时禁用）
opensearch:
  enabled: false
  hosts: http://localhost:9200
  username: admin
  password: admin
