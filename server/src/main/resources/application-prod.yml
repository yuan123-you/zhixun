# 生产环境配置
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:zhixun}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:zhixun123456}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

# MinIO 生产环境
minio:
  enabled: true
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:zhixun}

# OpenSearch 生产环境
opensearch:
  enabled: true
  hosts: ${OPENSEARCH_HOSTS:https://opensearch:9200}
  username: ${OPENSEARCH_USERNAME:admin}
  password: ${OPENSEARCH_PASSWORD:admin}
  connect-timeout: 5000
  socket-timeout: 60000
  index-prefix: zhixun_

# CORS 允许的来源
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://glint.novo.ccwu.cc,http://localhost:3000,http://localhost:3001,http://localhost:8080}

# 日志级别
logging:
  level:
    root: INFO
    com.zhixun: INFO
    com.zhixun.mapper: WARN
