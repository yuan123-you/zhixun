# 测试环境配置（无需 MinIO/OpenSearch）
spring:
  # MySQL 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/zhixun?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:

  # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# 关闭 MinIO
minio:
  enabled: false

# 关闭 OpenSearch
opensearch:
  enabled: false

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 日志级别调整
logging:
  level:
    root: INFO
    com.zhixun: DEBUG
    com.zhixun.mapper: WARN

# Sentinel 日志目录
sentinel:
  log:
    dir: ./logs/csp
