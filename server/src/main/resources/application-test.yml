# 测试环境配置（无需 MinIO/OpenSearch）
spring:
  # MySQL 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/zhixun?useUnicode=true&characterEncoding=utf-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:

  # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# 关闭 MinIO
minio:
  enabled: false

# 关闭 OpenSearch
opensearch:
  enabled: false

# JWT 测试环境密钥
jwt:
  access-secret: ${JWT_ACCESS_SECRET:test-access-secret-for-testing}
  refresh-secret: ${JWT_REFRESH_SECRET:test-refresh-secret-for-testing}

# AES 测试环境密钥
aes:
  secret-key: ${AES_SECRET_KEY:test-aes-32byte-key-not-prod}

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# CORS 测试环境配置（端口来源：docs/PORTS.md）
cors:
  allowed-origins: http://localhost:3500,http://localhost:5173,http://localhost:3001,http://localhost:8080

# 日志级别调整
logging:
  level:
    root: INFO
    com.zhixun: DEBUG
    com.zhixun.mapper: WARN

# Sentinel 日志目录
sentinel:
  log:
    dir: ./logs/csp
