server:
  port: 8080
  servlet:
    context-path: /api
  shutdown: graceful

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

spring:
  application:
    name: zhixun-server
  profiles:
    active: dev
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # MySQL 数据源配置（主从读写分离）
  datasource:
    # 主库 - 写操作
    master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:zhixun}?useUnicode=true&characterEncoding=utf-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${MYSQL_USER:root}
      password: ${MYSQL_PASSWORD:123456}
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        idle-timeout: 300000
        max-lifetime: 1200000
        connection-timeout: 30000
        connection-test-query: SELECT 1
    # 从库 - 读操作
    slave:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${MYSQL_SLAVE_HOST:localhost}:${MYSQL_SLAVE_PORT:3306}/${MYSQL_SLAVE_DB:zhixun}?useUnicode=true&characterEncoding=utf-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${MYSQL_SLAVE_USER:root}
      password: ${MYSQL_SLAVE_PASSWORD:123456}
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        idle-timeout: 300000
        max-lifetime: 1200000
        connection-timeout: 30000
        connection-test-query: SELECT 1

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: 3000ms

  # RabbitMQ 配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms

  # 邮件配置（QQ邮箱使用SSL 465端口）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: ${MAIL_PORT:465}

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    deserialization:
      # 将空字符串视为 null，避免 Long/String 类型反序列化失败
      ACCEPT_EMPTY_STRING_AS_NULL_OBJECT: true

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 30MB

# MyBatis-Plus 配置（具体环境的 log-impl 请在对应 profile 中覆盖）
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhixun.entity
  configuration:
    # 驼峰映射
    map-underscore-to-camel-case: true
    # 关闭二级缓存（项目使用 Spring Cache 多级缓存体系，MyBatis 二级缓存未启用且易造成数据不一致）
    cache-enabled: false
    # 复用预处理语句
    default-executor-type: REUSE
    # SQL 日志：各 profile 自行覆盖；基配置默认关闭（生产安全）
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      # 主键策略 - 自增
      id-type: auto
      # 表名前缀
      # table-prefix: t_

# JWT 配置
# ⚠️ 生产环境必须通过环境变量注入密钥，禁止使用默认值
jwt:
  # 访问令牌密钥（至少32字节，Base64编码）
  # 生成命令：openssl rand -base64 32
  access-secret: ${JWT_ACCESS_SECRET:}
  # 刷新令牌密钥（至少32字节，Base64编码）
  refresh-secret: ${JWT_REFRESH_SECRET:}
  # 访问令牌过期时间（秒）- 7天
  access-expiration: ${JWT_ACCESS_EXPIRATION:604800}
  # 刷新令牌过期时间（秒）- 7天
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}
  # 令牌前缀
  token-prefix: Bearer
  # 令牌请求头
  header-string: Authorization

# AES 加密配置（密钥必须精确 32 字节，Base64 编码）
# ⚠️ 生产环境必须通过环境变量注入密钥，禁止使用默认值
# 生成命令：openssl rand -base64 32
aes:
  secret-key: ${AES_SECRET_KEY:}

# 端口统一约定（完整定义见 docs/PORTS.md，本文件不做硬编码端口）
# - Backend: SERVER_PORT=8080（自身）
# - 客户端连接：MySQL=3306 / Redis=6379 / RabbitMQ=5672 / MinIO=9000 / OpenSearch=9201
# - 主机切换：本地开发使用 localhost，Docker 部署使用对应容器名
# - 历史变更：OpenSearch HTTP 原 9200 → 9201，让出 8080 给 Spring Boot

# OAuth 第三方登录配置
oauth:
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    authorize-url: https://open.weixin.qq.com/connect/qrconnect
    access-token-url: https://api.weixin.qq.com/sns/oauth2/access_token
    user-info-url: https://api.weixin.qq.com/sns/userinfo
  qq:
    app-id: ${QQ_APP_ID:}
    app-key: ${QQ_APP_KEY:}
    authorize-url: https://graph.qq.com/oauth2.0/authorize
    access-token-url: https://graph.qq.com/oauth2.0/token
    open-id-url: https://graph.qq.com/oauth2.0/me
    user-info-url: https://graph.qq.com/user/get_user_info

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:zhixun321}
  secret-key: ${MINIO_SECRET_KEY:zhixun321}
  bucket-name: ${MINIO_BUCKET:zhixun}

# OpenSearch 配置
# 端口规划（与 docs/PORTS.md 一致）：HTTP REST 统一使用 9201，让出 8080 给 Spring Boot
# 历史原因：OpenSearch 2.11 的 performance analyzer 默认监听 8080，会与后端冲突。
opensearch:
  hosts: ${OPENSEARCH_HOSTS:http://localhost:9201}
  username: ${OPENSEARCH_USERNAME:}
  password: ${OPENSEARCH_PASSWORD:}
  connect-timeout: 5000
  socket-timeout: 60000
  index-prefix: zhixun_

# Sentinel 限流熔断配置
# Dashboard 地址（端口来源：docs/PORTS.md）
#   本地：localhost:8080（与 Backend 同机）
#   Docker：server:8080
sentinel:
  # 是否启用 Sentinel（生产环境建议开启）
  enabled: ${SENTINEL_ENABLED:true}
  # 应用名称（用于 Sentinel Dashboard 标识）
  app-name: zhixun-server
  # 传输端口（Dashboard 通信）
  transport-port: ${SENTINEL_TRANSPORT_PORT:8719}
  # Dashboard 地址（如部署了 Sentinel Dashboard）
  dashboard: ${SENTINEL_DASHBOARD:localhost:8080}

# 应用配置
app:
  data-version: ${APP_DATA_VERSION:20250625}
  # 知讯官方账号ID（新用户注册后将自动关注该账号并接收欢迎消息）
  official-account-id: ${OFFICIAL_ACCOUNT_ID:1}
# 智谱AI 配置 (ZhiPuAI glm-4.7-flash)
zhixun:
  ai:
    api-key: ${ZHIPU_API_KEY:}
    base-url: ${ZHIPU_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
    # 智谱免费模型：glm-4.7-flash（300亿参数MoE，https://open.bigmodel.cn/ ）
    model: ${ZHIPU_MODEL:glm-4.7-flash}
  # 腾讯地图配置（用于 IP 定位 / 逆地理编码）
  map:
    tencent:
      # 腾讯地图开发者 Key；为空时 IP 定位降级到 ip-api
      key: ${TENCENT_MAP_KEY:}
      # 是否启用腾讯地图 IP 定位（生产建议 true）
      enabled: ${TENCENT_MAP_ENABLED:true}

logging:
  level:
    root: INFO
    com.zhixun: DEBUG
    com.zhixun.mapper: DEBUG
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS
