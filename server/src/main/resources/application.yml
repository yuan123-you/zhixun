server:
  port: 8080
  servlet:
    context-path: /api
  shutdown: graceful

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

spring:
  application:
    name: zhixun-server
  profiles:
    active: dev
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # MySQL 数据源配置（主从读写分离）
  datasource:
    # 主库 - 写操作
    master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:zhixun}?useUnicode=true&characterEncoding=utf-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${MYSQL_USER:root}
      password: ${MYSQL_PASSWORD:123456}
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        idle-timeout: 300000
        max-lifetime: 1200000
        connection-timeout: 30000
        connection-test-query: SELECT 1
    # 从库 - 读操作
    slave:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${MYSQL_SLAVE_HOST:localhost}:${MYSQL_SLAVE_PORT:3306}/${MYSQL_SLAVE_DB:zhixun}?useUnicode=true&characterEncoding=utf-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${MYSQL_SLAVE_USER:root}
      password: ${MYSQL_SLAVE_PASSWORD:123456}
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        idle-timeout: 300000
        max-lifetime: 1200000
        connection-timeout: 30000
        connection-test-query: SELECT 1

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: 3000ms

  # RabbitMQ 配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms

  # 邮件配置（QQ邮箱使用SSL 465端口）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: ${MAIL_PORT:465}

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhixun.entity
  configuration:
    # 驼峰映射
    map-underscore-to-camel-case: true
    # 开启二级缓存
    cache-enabled: true
    # 复用预处理语句
    default-executor-type: REUSE
    # 日志输出（开发环境使用 StdOutImpl，生产环境请改为 NoLoggingImpl 或 Slf4jImpl）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略 - 自增
      id-type: auto
      # 表名前缀
      # table-prefix: t_

# JWT 配置
jwt:
  # 访问令牌密钥
  access-secret: ${JWT_ACCESS_SECRET:zhixun-access-secret-key-2024-must-be-at-least-256-bits-long}
  # 刷新令牌密钥
  refresh-secret: ${JWT_REFRESH_SECRET:zhixun-refresh-secret-key-2024-must-be-at-least-256-bits-long}
  # 访问令牌过期时间（秒）- 2小时
  access-expiration: ${JWT_ACCESS_EXPIRATION:7200}
  # 刷新令牌过期时间（秒）- 7天
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}
  # 令牌前缀
  token-prefix: Bearer
  # 令牌请求头
  header-string: Authorization

# AES 加密配置
aes:
  secret-key: ${AES_SECRET_KEY:zhixun-aes-secret-key-2024-must-be-32b}

# SSR 服务端通信配置
ssr:
  # SSR 服务端通信密钥：用于 Nuxt SSR 发起 POST 等状态变更请求时替代 CSRF Token
  # 仅在服务端环境变量中配置，不暴露给浏览器端，防止 CSRF 攻击
  # Nuxt SSR 请求时通过 X-SSR-Secret 请求头携带此密钥
  secret: ${SSR_SECRET:}

# OAuth 第三方登录配置
oauth:
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    authorize-url: https://open.weixin.qq.com/connect/qrconnect
    access-token-url: https://api.weixin.qq.com/sns/oauth2/access_token
    user-info-url: https://api.weixin.qq.com/sns/userinfo
  qq:
    app-id: ${QQ_APP_ID:}
    app-key: ${QQ_APP_KEY:}
    authorize-url: https://graph.qq.com/oauth2.0/authorize
    access-token-url: https://graph.qq.com/oauth2.0/token
    open-id-url: https://graph.qq.com/oauth2.0/me
    user-info-url: https://graph.qq.com/user/get_user_info

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:zhixun321}
  secret-key: ${MINIO_SECRET_KEY:zhixun321}
  bucket-name: ${MINIO_BUCKET:zhixun}

# OpenSearch 配置
opensearch:
  hosts: ${OPENSEARCH_HOSTS:http://localhost:9200}
  username: ${OPENSEARCH_USERNAME:}
  password: ${OPENSEARCH_PASSWORD:}
  connect-timeout: 5000
  socket-timeout: 60000
  index-prefix: zhixun_

# Sentinel 限流熔断配置
sentinel:
  # 是否启用 Sentinel（生产环境建议开启）
  enabled: ${SENTINEL_ENABLED:true}
  # 应用名称（用于 Sentinel Dashboard 标识）
  app-name: zhixun-server
  # 传输端口（Dashboard 通信）
  transport-port: ${SENTINEL_TRANSPORT_PORT:8719}
  # Dashboard 地址（如部署了 Sentinel Dashboard）
  dashboard: ${SENTINEL_DASHBOARD:localhost:8080}

# 日志配置
logging:
  level:
    root: INFO
    com.zhixun: DEBUG
    com.zhixun.mapper: DEBUG
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS
