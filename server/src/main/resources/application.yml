server:
  port: 8080
  servlet:
    context-path: /api

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

spring:
  application:
    name: zhixun-server
  profiles:
    active: dev

  # MySQL 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:zhixun}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # RabbitMQ 配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhixun.entity
  configuration:
    # 驼峰映射
    map-underscore-to-camel-case: true
    # 日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略 - 自增
      id-type: auto
      # 表名前缀
      # table-prefix: t_

# JWT 配置
jwt:
  # 访问令牌密钥
  access-secret: ${JWT_ACCESS_SECRET:zhixun-access-secret-key-2024-must-be-at-least-256-bits-long}
  # 刷新令牌密钥
  refresh-secret: ${JWT_REFRESH_SECRET:zhixun-refresh-secret-key-2024-must-be-at-least-256-bits-long}
  # 访问令牌过期时间（秒）- 2小时
  access-expiration: ${JWT_ACCESS_EXPIRATION:7200}
  # 刷新令牌过期时间（秒）- 7天
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}
  # 令牌前缀
  token-prefix: Bearer
  # 令牌请求头
  header-string: Authorization

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:zhixun}

# OpenSearch 配置
opensearch:
  hosts: ${OPENSEARCH_HOSTS:http://localhost:9200}
  username: ${OPENSEARCH_USERNAME:admin}
  password: ${OPENSEARCH_PASSWORD:admin}
  connect-timeout: 5000
  socket-timeout: 60000
  index-prefix: zhixun_

# Sentinel 限流熔断配置
sentinel:
  # 是否启用 Sentinel（生产环境建议开启）
  enabled: ${SENTINEL_ENABLED:true}
  # 应用名称（用于 Sentinel Dashboard 标识）
  app-name: zhixun-server
  # 传输端口（Dashboard 通信）
  transport-port: ${SENTINEL_TRANSPORT_PORT:8719}
  # Dashboard 地址（如部署了 Sentinel Dashboard）
  dashboard: ${SENTINEL_DASHBOARD:localhost:8080}

# 日志配置
logging:
  level:
    root: INFO
    com.zhixun: DEBUG
    com.zhixun.mapper: DEBUG
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS
